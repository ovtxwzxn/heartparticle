<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Particle Heart</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: radial-gradient(circle at center, #2a0815 0%, #050102 100%);
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>
    <!-- Import Three.js and GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script>
        // 1. Setup Scene, Camera, and Renderer
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x050102, 0.015);

        const isMobile = window.innerWidth < 768;
        const targetZ = isMobile ? 110 : 45;
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = targetZ;

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        // 2. Handle Window Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            
            const isMobileResize = window.innerWidth < 768;
            gsap.to(camera.position, {
                z: isMobileResize ? 110 : 45,
                duration: 0.5
            });
        });

        // 3. Heart Mathematical Function
        // Using parametric equations for a heart shape
        function getHeartPoint(t) {
            const x = 16 * Math.pow(Math.sin(t), 3);
            const y = 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t);
            // Offset y to center the heart vertically. The math formula's bounds are approx [12, -17], center is ~ -2.5
            return new THREE.Vector3(x, y + 2.5, 0);
        }

        // 4. Create Particles
        const particlesCount = 15000;
        const geometry = new THREE.BufferGeometry();
        
        const positions = new Float32Array(particlesCount * 3);
        const chaosPositions = new Float32Array(particlesCount * 3);
        const colors = new Float32Array(particlesCount * 3);
        const sizes = new Float32Array(particlesCount);
        const randoms = new Float32Array(particlesCount); // For individualized animation
        
        // Colors palette (Premium Romantic)
        const colorPalette = [
            new THREE.Color(0xff7eb3), // Pink Cerah
            new THREE.Color(0xffdfba), // Rose Gold
            new THREE.Color(0xb04f5c)  // Merah Gelap/Burgundy
        ];
        
        for (let i = 0; i < particlesCount; i++) {
            // Generate parameter t using rejection sampling to distribute particles evenly along the curve.
            // This eliminates the "spine" caused by parametric slow-downs at the poles (t=0, t=PI).
            let t;
            do {
                t = Math.random() * Math.PI * 2;
                // Derivatives to find the speed of the curve at t
                const dx = 48 * Math.pow(Math.sin(t), 2) * Math.cos(t);
                const dy = -13 * Math.sin(t) + 10 * Math.sin(2 * t) + 6 * Math.sin(3 * t) + 4 * Math.sin(4 * t);
                const speed = Math.sqrt(dx * dx + dy * dy);
                // 25 is approximately the maximum speed of the curve
                if (Math.random() * 25 < speed) {
                    break;
                }
            } while (true);
            
            const basePoint = getHeartPoint(t);
            
            // Volumetric distribution (gaussian-like spread)
            const r = Math.random();
            const u = Math.random();
            const v = Math.random();
            
            // Create a distribution heavily weighted towards the center of the shell
            const distance = Math.pow(Math.random(), 3) * 1.5; 
            
            const spreadX = (Math.random() - 0.5) * 8 * distance;
            const spreadY = (Math.random() - 0.5) * 8 * distance;
            const spreadZ = (Math.random() - 0.5) * 20 * distance;
            
            const scale = 0.5 + Math.random() * 0.5;

            // Target Heart Position
            positions[i * 3] = basePoint.x * scale + spreadX;
            positions[i * 3 + 1] = basePoint.y * scale + spreadY;
            positions[i * 3 + 2] = spreadZ;

            // Chaos Position (Random scattered)
            const chaosRadius = 20 + Math.random() * 180;
            const chaosTheta = Math.random() * Math.PI * 2;
            const chaosPhi = Math.acos((Math.random() * 2) - 1);
            
            chaosPositions[i * 3] = chaosRadius * Math.sin(chaosPhi) * Math.cos(chaosTheta);
            chaosPositions[i * 3 + 1] = chaosRadius * Math.sin(chaosPhi) * Math.sin(chaosTheta);
            chaosPositions[i * 3 + 2] = chaosRadius * Math.cos(chaosPhi);

            // Assign random color from palette
            const color = colorPalette[Math.floor(Math.random() * colorPalette.length)];
            
            // Add subtle variation
            color.lerp(new THREE.Color(0xffffff), Math.random() * 0.2);
            
            colors[i * 3] = color.r;
            colors[i * 3 + 1] = color.g;
            colors[i * 3 + 2] = color.b;

            // Varying sizes
            sizes[i] = Math.random() * 1.75 + 0.2;
            
            // Random phase for heartbeat
            randoms[i] = Math.random();
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('aChaosPos', new THREE.BufferAttribute(chaosPositions, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
        geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
        geometry.setAttribute('aRandom', new THREE.BufferAttribute(randoms, 1));

        // 5. Custom Shader Material for Beating Effect & Soft Particles
        const material = new THREE.ShaderMaterial({
            uniforms: {
                uTime: { value: 0 },
                uPulseStart: { value: 0 }, // GSAP will animate this
                uFormation: { value: 0 }  // GSAP will animate this (0 = Chaos, 1 = Heart)
            },
            vertexShader: `
                uniform float uTime;
                uniform float uPulseStart;
                uniform float uFormation;
                
                attribute float size;
                attribute vec3 color;
                attribute float aRandom;
                attribute vec3 aChaosPos;
                
                varying vec3 vColor;
                
                void main() {
                    vColor = color;
                    
                    // Interpolate from Chaos to Heart based on uFormation
                    // Stagger the animation start time per particle using aRandom
                    float particleProgress = clamp((uFormation - aRandom * 0.4) / 0.6, 0.0, 1.0);
                    
                    // Ease out expo for smooth snapping into place
                    float easeProgress = particleProgress == 1.0 ? 1.0 : 1.0 - pow(2.0, -10.0 * particleProgress);
                    
                    // Swirl effect while in chaos
                    vec3 startPos = aChaosPos;
                    float swirlAngle = uTime * 0.5 * (aRandom * 2.0 - 1.0);
                    float s = sin(swirlAngle);
                    float c = cos(swirlAngle);
                    mat2 rot = mat2(c, -s, s, c);
                    startPos.xz *= rot;
                    startPos.xy *= rot;
                    
                    // Blend from chaotic swirl to fixed heart position
                    vec3 targetPos = position;
                    vec3 pos = mix(startPos, targetPos, easeProgress);
                    
                    // Complex heartbeat formula
                    // Fast beat followed by a slower beat, then pause
                    float beatTime = fract(uTime * 1.2); // 1.2 BPM base
                    
                    float pulse1 = exp(-20.0 * beatTime) * sin(beatTime * 40.0) * 0.1;
                    float pulse2 = exp(-20.0 * (beatTime - 0.3)) * sin((beatTime - 0.3) * 40.0) * 0.08 * step(0.3, beatTime);
                    
                    float pulse = max(0.0, pulse1 + pulse2);
                    
                    // Add noise to the pulse based on particle random value
                    float individualizedPulse = pulse * (0.8 + aRandom * 0.4);
                    
                    // Expansion based on GSAP uniform (uPulseStart)
                    float gsapPulse = uPulseStart * (1.0 + aRandom * 0.2);
                    
                    // Apply scale (only apply beating effect when formed)
                    pos *= (1.0 + (individualizedPulse + gsapPulse) * easeProgress);
                    
                    // Add subtle wave motion when formed
                    pos.x += sin(uTime * 2.0 + pos.y * 0.1) * 0.2 * aRandom * easeProgress;
                    pos.y += cos(uTime * 1.5 + pos.x * 0.1) * 0.2 * aRandom * easeProgress;
                    
                    vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);
                    
                    // Perspective size attenuation (safeguard division by small number)
                    float zDist = max(-mvPosition.z, 0.1);
                    gl_PointSize = size * (200.0 / zDist);
                    gl_Position = projectionMatrix * mvPosition;
                }
            `,
            fragmentShader: `
                varying vec3 vColor;
                
                void main() {
                    // Create soft, glowing circular particles
                    vec2 coord = gl_PointCoord - vec2(0.5);
                    float dist = length(coord);
                    
                    if (dist > 0.5) discard;
                    
                    // Core and glow
                    float alpha = smoothstep(0.5, 0.1, dist);
                    
                    // Brighter center
                    vec3 finalColor = mix(vColor, vec3(1.0), smoothstep(0.3, 0.0, dist) * 0.5);
                    
                    gl_FragColor = vec4(finalColor, alpha * 0.9);
                }
            `,
            transparent: true,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
            depthTest: false
        });

        const heart = new THREE.Points(geometry, material);
        scene.add(heart);

        // 6. GSAP Animations
        // Continuous rotation
        gsap.to(heart.rotation, {
            y: Math.PI * 2,
            duration: 25,
            repeat: -1,
            ease: "none",
            delay: 4.0
        });

        // Entrance animation: Chaos to Heart
        // The particles form into the heart shape
        gsap.fromTo(material.uniforms.uFormation, 
            { value: 0 },
            { value: 1, duration: 3.5, ease: "expo.inOut", delay: 0.5 }
        );

        // Dramatic camera pull-in from chaos
        gsap.fromTo(camera.position,
            { z: isMobile ? 180 : 120 },
            { z: targetZ, duration: 4.0, ease: "power3.inOut" }
        );

        // Boom pulse effect right as the heart finishes forming
        gsap.fromTo(material.uniforms.uPulseStart, 
            { value: 1.5 },
            { value: 0, duration: 2.5, ease: "elastic.out(1, 0.3)", delay: 3.8 }
        );

        // 7. Mouse & Touch Interaction (Physical Inertia & Drag)
        let isDragging = false;
        let previousX = 0;
        let velocityX = 0;
        let targetRotation = 0;
        
        // Physics settings for a "Heavy Glass Ball" feel
        const dragSensitivity = 0.008; // Sensitivity of swipe
        const momentumDamping = 0.96; // Inertia/Friction (higher = spins longer)
        const lerpFactor = 0.08; // Responsiveness (lower = feels heavier)

        function onDragStart(x) {
            isDragging = true;
            previousX = x;
            velocityX = 0; // Stop momentum when grabbed
        }

        function onDragMove(x) {
            if (!isDragging) return;
            const deltaX = x - previousX;
            
            targetRotation += deltaX * dragSensitivity;
            velocityX = deltaX * dragSensitivity; // Track velocity for release momentum
            
            previousX = x;
        }

        function onDragEnd() {
            isDragging = false;
        }

        // Mouse Events
        document.addEventListener('mousedown', (event) => onDragStart(event.clientX));
        document.addEventListener('mousemove', (event) => onDragMove(event.clientX));
        document.addEventListener('mouseup', onDragEnd);
        document.addEventListener('mouseleave', () => { if (isDragging) onDragEnd(); });

        // Touch Events
        document.addEventListener('touchstart', (event) => {
            if (event.touches.length > 0) onDragStart(event.touches[0].clientX);
        }, { passive: true });
        
        document.addEventListener('touchmove', (event) => {
            if (event.touches.length > 0) onDragMove(event.touches[0].clientX);
        }, { passive: true });
        
        document.addEventListener('touchend', onDragEnd);
        document.addEventListener('touchcancel', onDragEnd);

        // 8. Animation Loop
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);

            const elapsedTime = clock.getElapsedTime();
            material.uniforms.uTime.value = elapsedTime;

            // Apply inertia if not dragging
            if (!isDragging) {
                targetRotation += velocityX;
                velocityX *= momentumDamping;
            }

            // Smoothly interpolate scene rotation towards target rotation
            scene.rotation.y += (targetRotation - scene.rotation.y) * lerpFactor;
            
            // Subtle floating motion
            heart.position.y = Math.sin(elapsedTime) * 1.5;

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
